<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎓 Mis Exámenes</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
  :root {
    --mat: #FF6B6B; --mat-l: #FFE8E8;
    --bio: #51CF66; --bio-l: #E8FFE8;
    --qui: #845EF7; --qui-l: #F0EBFF;
    --soc: #FF922B; --soc-l: #FFF0E0;
    --len: #339AF0; --len-l: #E8F4FF;
    --bg: #F8F9FF;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --radius: 20px;
    --shadow: 0 8px 32px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
    padding: 20px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 50%, rgba(255,107,107,0.15) 0%, transparent 60%),
                radial-gradient(circle at 80% 50%, rgba(81,207,102,0.15) 0%, transparent 60%);
  }
  .header h1 { font-family: 'Fredoka One', cursive; font-size: 2rem; color: white; position: relative; letter-spacing: 1px; }
  .header p { color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-top: 4px; position: relative; }
  .nombre-badge {
    display: inline-block; background: rgba(255,255,255,0.15); color: white;
    padding: 6px 18px; border-radius: 50px; font-weight: 700; font-size: 0.95rem;
    margin-top: 10px; position: relative; cursor: pointer; border: 2px solid rgba(255,255,255,0.25);
  }
  .btn-logout {
    display: inline-block; background: rgba(255,100,100,0.25); color: white;
    padding: 5px 14px; border-radius: 50px; font-weight: 700; font-size: 0.82rem;
    margin-top: 8px; margin-left: 8px; cursor: pointer; border: 2px solid rgba(255,100,100,0.4);
    vertical-align: middle; transition: background 0.2s;
  }
  .btn-logout:hover { background: rgba(255,80,80,0.45); }

  #screen-login {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 80vh; padding: 32px 20px;
  }
  .login-card {
    background: white; border-radius: 28px; padding: 40px 36px;
    max-width: 400px; width: 100%; box-shadow: var(--shadow); text-align: center;
  }
  .login-emoji { font-size: 4rem; margin-bottom: 16px; }
  .login-card h2 { font-family: 'Fredoka One', cursive; font-size: 1.6rem; margin-bottom: 8px; color: var(--text); }
  .login-card p { color: #666; margin-bottom: 28px; font-size: 0.95rem; }
  .input-name {
    width: 100%; padding: 16px 20px; border: 3px solid #E0E0E0; border-radius: 16px;
    font-size: 1.1rem; font-family: 'Nunito', sans-serif; font-weight: 700;
    outline: none; transition: border-color 0.2s; text-align: center;
  }
  .input-name:focus { border-color: #339AF0; }
  .btn-entrar {
    width: 100%; margin-top: 16px; padding: 16px;
    background: linear-gradient(135deg, #339AF0, #228BE6); color: white; border: none;
    border-radius: 16px; font-size: 1.1rem; font-family: 'Nunito', sans-serif;
    font-weight: 800; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(51,154,240,0.4);
  }
  .btn-entrar:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(51,154,240,0.5); }

  #screen-inicio { display: none; padding: 24px 20px; max-width: 800px; margin: 0 auto; }

  .dias-title { font-family: 'Fredoka One', cursive; font-size: 1.4rem; margin-bottom: 20px; text-align: center; color: var(--text); }

  .dia-card {
    background: white; border-radius: var(--radius); padding: 20px;
    margin-bottom: 16px; box-shadow: var(--shadow); border: 3px solid transparent; transition: all 0.2s;
  }
  .dia-card.desbloqueado { border-color: #E0E0E0; }
  .dia-card.bloqueado { opacity: 0.5; filter: grayscale(0.5); }
  .dia-card.activo { border-color: #51CF66; box-shadow: 0 8px 32px rgba(81,207,102,0.2); }

  .dia-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .dia-num {
    font-family: 'Fredoka One', cursive; font-size: 1.8rem;
    background: linear-gradient(135deg, #1A1A2E, #0F3460); color: white;
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .dia-info h3 { font-weight: 800; font-size: 1.1rem; }
  .dia-info p { color: #888; font-size: 0.85rem; }

  .materias-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  @media(max-width: 500px) { .materias-grid { grid-template-columns: repeat(3, 1fr); } }

  .materia-btn {
    padding: 10px 6px; border-radius: 14px; border: none; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.78rem;
    text-align: center; transition: all 0.2s; position: relative;
  }
  .materia-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
  .materia-btn:disabled { cursor: not-allowed; }
  .materia-btn .mat-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }
  .materia-btn.completado::after { content: '✅'; position: absolute; top: -6px; right: -6px; font-size: 1rem; }

  .mat-btn { background: var(--mat-l); color: var(--mat); }
  .bio-btn { background: var(--bio-l); color: var(--bio); }
  .qui-btn { background: var(--qui-l); color: var(--qui); }
  .soc-btn { background: var(--soc-l); color: var(--soc); }
  .len-btn { background: var(--len-l); color: var(--len); }

  #screen-examen { display: none; padding: 0; }

  .examen-header {
    padding: 20px 24px 16px; background: white;
    border-bottom: 3px solid #F0F0F0; position: sticky; top: 0; z-index: 10;
  }
  .examen-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .btn-volver {
    background: #F0F0F0; border: none; border-radius: 12px; padding: 8px 16px;
    font-family: 'Nunito', sans-serif; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: background 0.2s;
  }
  .btn-volver:hover { background: #E0E0E0; }
  .examen-materia-badge { padding: 6px 16px; border-radius: 50px; font-weight: 800; font-size: 0.9rem; }

  .progress-bar-wrap { background: #F0F0F0; border-radius: 50px; height: 10px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 50px; transition: width 0.4s ease; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: #888; margin-top: 6px; font-weight: 600; }

  .pregunta-container { padding: 24px 20px; max-width: 720px; margin: 0 auto; }
  .pregunta-num { font-size: 0.85rem; font-weight: 700; color: #888; margin-bottom: 8px; }
  .pregunta-text { font-size: 1.1rem; font-weight: 700; line-height: 1.5; margin-bottom: 24px; color: var(--text); }

  .opciones-list { display: flex; flex-direction: column; gap: 12px; }

  .opcion-btn {
    background: white; border: 3px solid #E8E8E8; border-radius: 16px; padding: 16px 20px;
    text-align: left; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 1rem;
    font-weight: 600; display: flex; align-items: flex-start; gap: 14px; transition: all 0.2s; line-height: 1.4;
  }
  .opcion-btn:hover:not(:disabled) { border-color: #339AF0; background: #F0F8FF; transform: translateX(4px); }
  .opcion-letra {
    width: 32px; height: 32px; border-radius: 10px; background: #F0F0F0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.9rem; flex-shrink: 0; transition: all 0.2s;
  }
  .opcion-btn.correcta { border-color: #51CF66; background: #E8FFE8; animation: pulse-green 0.4s ease; }
  .opcion-btn.correcta .opcion-letra { background: #51CF66; color: white; }
  .opcion-btn.incorrecta { border-color: #FF6B6B; background: #FFE8E8; animation: shake 0.4s ease; }
  .opcion-btn.incorrecta .opcion-letra { background: #FF6B6B; color: white; }
  .opcion-btn.correcta-revelar { border-color: #51CF66; background: #E8FFE8; }
  .opcion-btn.correcta-revelar .opcion-letra { background: #51CF66; color: white; }
  .opcion-btn:disabled { cursor: not-allowed; }

  .feedback-msg {
    margin-top: 16px; padding: 12px 18px; border-radius: 14px;
    font-weight: 700; font-size: 1rem; text-align: center; opacity: 0; transition: opacity 0.3s;
  }
  .feedback-msg.show { opacity: 1; }
  .feedback-msg.ok { background: #E8FFE8; color: #2B8A3E; }
  .feedback-msg.fail { background: #FFE8E8; color: #C92A2A; }
  .feedback-msg.intento { background: #FFF3CD; color: #856404; }

  .btn-siguiente {
    width: 100%; margin-top: 20px; padding: 18px; border: none; border-radius: 16px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.1rem;
    cursor: pointer; transition: all 0.2s; display: none;
  }
  .btn-siguiente.show { display: block; }
  .btn-siguiente:hover { transform: translateY(-2px); }

  #screen-resultado { display: none; padding: 32px 20px; max-width: 600px; margin: 0 auto; text-align: center; }
  .resultado-emoji { font-size: 5rem; margin-bottom: 16px; }
  .resultado-titulo { font-family: 'Fredoka One', cursive; font-size: 2rem; margin-bottom: 8px; }
  .resultado-sub { color: #666; margin-bottom: 28px; font-size: 1rem; }

  .puntaje-circle {
    width: 160px; height: 160px; border-radius: 50%; margin: 0 auto 28px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .puntaje-num { font-size: 3rem; line-height: 1; color: white; }
  .puntaje-de { font-size: 1rem; color: rgba(255,255,255,0.8); }

  .detalle-respuestas { background: white; border-radius: var(--radius); padding: 20px; margin-bottom: 24px; box-shadow: var(--shadow); text-align: left; }
  .detalle-respuestas h3 { font-weight: 800; margin-bottom: 14px; font-size: 1rem; }
  .respuesta-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #F0F0F0; font-size: 0.85rem; line-height: 1.4; }
  .respuesta-item:last-child { border-bottom: none; }
  .respuesta-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

  .btns-resultado { display: flex; flex-direction: column; gap: 12px; }
  .btn-otra-materia { padding: 16px; border-radius: 16px; border: 3px solid #E0E0E0; background: white; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
  .btn-otra-materia:hover { border-color: #339AF0; background: #F0F8FF; }
  .btn-inicio-final { padding: 16px; border-radius: 16px; border: none; background: linear-gradient(135deg, #1A1A2E, #0F3460); color: white; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .btn-inicio-final:hover { transform: translateY(-2px); }

  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; color: #888; font-weight: 600; }
  .spinner { width: 48px; height: 48px; border: 5px solid #E0E0E0; border-top-color: #339AF0; border-radius: 50%; animation: spin 0.8s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
  @keyframes pulse-green { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.4s ease both; }

  .error-msg { background: #FFE8E8; color: #C92A2A; border-radius: 14px; padding: 16px 20px; margin: 20px; font-weight: 700; text-align: center; }

  /* MIS RESULTADOS */
  #screen-misresultados { display: none; padding: 24px 20px; max-width: 800px; margin: 0 auto; }
  .res-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .res-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .res-card-titulo { font-size: 1.1rem; font-weight: 800; }
  .res-promedio { padding: 4px 12px; border-radius: 50px; font-weight: 800; font-size: 0.9rem; }
  .res-barras { display: flex; gap: 8px; align-items: flex-end; height: 80px; margin-bottom: 8px; }
  .res-barra-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .res-barra-pct { font-size: 0.7rem; font-weight: 700; }
  .res-barra { width: 100%; border-radius: 6px 6px 0 0; min-height: 4px; }
  .res-barra-dia { font-size: 0.65rem; color: #888; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <h1>🎓 Mis Exámenes</h1>
  <p>¡Aprende un poco cada día!</p>
  <div id="header-nombre-wrap" style="display:none">
    <div class="nombre-badge" id="header-nombre" onclick="cambiarNombre()">
      👤 <span id="header-nombre-text"></span> ✏️
    </div>
    <span class="btn-logout" onclick="cerrarSesion()">🚪 Salir</span>
  </div>
</div>

<div id="screen-login">
  <div class="login-card fade-in">
    <div class="login-emoji">🧠</div>
    <h2>¡Hola! ¿Cuál es tu código?</h2>
    <p>Escribe el código que te dio tu profe</p>
    <input class="input-name" type="text" id="input-nombre"
           placeholder="Ej: TOMAS2026" maxlength="20"
           style="text-transform:uppercase"
           onkeydown="if(event.key==='Enter') entrar()"/>
    <div id="login-error" style="color:#C92A2A;font-weight:700;font-size:0.9rem;margin-top:8px;display:none"></div>
    <button class="btn-entrar" onclick="entrar()">¡Entrar! 🚀</button>
  </div>
</div>

<div id="screen-inicio">
  <p class="dias-title">📅 Elige tu examen de hoy</p>
  <div style="text-align:center;margin-bottom:20px">
    <button onclick="verMisResultados()" style="background:linear-gradient(135deg,#1A1A2E,#0F3460);color:white;border:none;border-radius:16px;padding:12px 28px;font-family:Nunito,sans-serif;font-weight:800;font-size:1rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.2)">📊 Mis Resultados</button>
  </div>
  <div id="dias-container"></div>
</div>

<div id="screen-examen">
  <div class="examen-header">
    <div class="examen-top">
      <button class="btn-volver" onclick="volverInicio()">← Volver</button>
      <span class="examen-materia-badge" id="examen-badge">📚</span>
      <span style="font-weight:800;font-size:0.95rem" id="examen-dia-label">Día 1</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label">
      <span id="progress-text">Pregunta 1 de 25</span>
      <span id="progress-pct">0%</span>
    </div>
  </div>
  <div class="pregunta-container" id="pregunta-container">
    <div class="loading"><div class="spinner"></div><span>Cargando preguntas...</span></div>
  </div>
</div>

<div id="screen-misresultados">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
    <button class="btn-volver" onclick="volverInicio()">← Volver</button>
    <h2 style="font-family:'Fredoka One',cursive;font-size:1.6rem">📊 Mis Resultados</h2>
  </div>
  <div id="resultados-container">
    <div class="loading"><div class="spinner"></div><span>Cargando resultados...</span></div>
  </div>
</div>

<div id="screen-resultado">
  <div class="resultado-emoji" id="res-emoji">🏆</div>
  <div class="resultado-titulo" id="res-titulo">¡Excelente!</div>
  <div class="resultado-sub" id="res-sub"></div>
  <div class="puntaje-circle" id="res-circle">
    <div class="puntaje-num" id="res-num">0</div>
    <div class="puntaje-de" id="res-de">de 25</div>
  </div>
  <div class="detalle-respuestas">
    <h3>📋 Resumen de respuestas</h3>
    <div id="res-detalle"></div>
  </div>
  <div class="btns-resultado">
    <button class="btn-otra-materia" onclick="volverInicio()">📚 Hacer otra materia</button>
    <button class="btn-inicio-final" onclick="volverInicio()">🏠 Ir al inicio</button>
  </div>
</div>

<script>
const MATERIAS = {
  MAT: { nombre: 'Matemáticas', emoji: '🔢', clase: 'mat-btn', color: '#FF6B6B', gradiente: 'linear-gradient(135deg,#FF6B6B,#FA5252)' },
  BIO: { nombre: 'Biología',    emoji: '🌿', clase: 'bio-btn', color: '#51CF66', gradiente: 'linear-gradient(135deg,#51CF66,#37B24D)' },
  QUI: { nombre: 'Química',     emoji: '⚗️', clase: 'qui-btn', color: '#845EF7', gradiente: 'linear-gradient(135deg,#845EF7,#7048E8)' },
  SOC: { nombre: 'Cs. Sociales',emoji: '🌍', clase: 'soc-btn', color: '#FF922B', gradiente: 'linear-gradient(135deg,#FF922B,#F76707)' },
  LEN: { nombre: 'Lenguaje',    emoji: '📖', clase: 'len-btn', color: '#339AF0', gradiente: 'linear-gradient(135deg,#339AF0,#1971C2)' },
};
const TOTAL_DIAS = 6;

let estado = { nombre: '', diaActual: 1, completados: {} };
let examenActual = { dia: 1, materia: '', preguntas: [], idx: 0, respuestas: [], puntaje: 0, intentos: 0 };

function cargarEstado() {
  try { const s = localStorage.getItem('examen_estado'); if (s) estado = { ...estado, ...JSON.parse(s) }; } catch(e) {}
}
function guardarEstadoLocal() { localStorage.setItem('examen_estado', JSON.stringify(estado)); }

function diaDisponible(dia) { return dia <= estado.diaActual; }
function diaCompleto(dia) { return Object.keys(MATERIAS).every(m => estado.completados[`${dia}_${m}`]); }
function materiaCompletada(dia, mat) { return !!estado.completados[`${dia}_${mat}`]; }
function intentarDesbloquearSiguienteDia() {
  if (diaCompleto(estado.diaActual) && estado.diaActual < TOTAL_DIAS) {
    estado.diaActual++;
    guardarEstadoLocal();
  }
}

function mostrar(id) {
  ['screen-login','screen-inicio','screen-examen','screen-resultado','screen-misresultados'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = id === 'screen-login' ? 'flex' : 'block';
}

async function entrar() {
  const codigo = document.getElementById('input-nombre').value.trim().toUpperCase();
  if (!codigo) { document.getElementById('input-nombre').style.borderColor = '#FF6B6B'; return; }
  const btn = document.querySelector('.btn-entrar');
  btn.textContent = 'Verificando...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ codigo })
    });
    const data = await res.json();
    if (!data.ok) {
      document.getElementById('login-error').textContent = data.error;
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('input-nombre').style.borderColor = '#FF6B6B';
      btn.textContent = '¡Entrar! 🚀';
      btn.disabled = false;
      return;
    }
    estado.nombre = data.nombre;
    estado.codigo = data.codigo;
    guardarEstadoLocal();
    mostrarHeaderNombre();
    mostrar('screen-inicio');
    await sincronizarCompletadosDesdeSheets();
    renderInicio();
  } catch(e) {
    document.getElementById('login-error').textContent = 'Error de conexión. Intenta de nuevo.';
    document.getElementById('login-error').style.display = 'block';
    btn.textContent = '¡Entrar! 🚀';
    btn.disabled = false;
  }
}

function mostrarHeaderNombre() {
  document.getElementById('header-nombre-wrap').style.display = 'inline-block';
  document.getElementById('header-nombre-text').textContent = estado.nombre;
}

function cerrarSesion() {
  if (!confirm('¿Seguro que quieres salir? Puedes volver a entrar con tu código.')) return;
  localStorage.removeItem('examen_estado');
  estado = { nombre: '', diaActual: 1, completados: {} };
  document.getElementById('header-nombre-wrap').style.display = 'none';
  document.getElementById('input-nombre').value = '';
  document.getElementById('login-error').style.display = 'none';
  mostrar('screen-login');
}

async function sincronizarCompletadosDesdeSheets() {
  if (!estado.nombre) return;
  try {
    const res = await fetch('/api/resultados?nombre=' + encodeURIComponent(estado.nombre));
    const data = await res.json();
    if (!data.ok || !data.resultados) return;
    const NOMBRES = { MAT:'Matemáticas', BIO:'Biología', QUI:'Química', SOC:'Cs. Sociales', LEN:'Lenguaje' };
    data.resultados.forEach(r => {
      const matKey = Object.keys(NOMBRES).find(k => NOMBRES[k] === r.materia);
      const diaNum = r.dia ? r.dia.replace('Día ','').replace('Dia ','').trim() : null;
      if (matKey && diaNum) {
        estado.completados[`${diaNum}_${matKey}`] = true;
      }
    });
    // Recalcular diaActual según completados reales
    for (let d = 1; d <= 6; d++) {
      const todasCompletas = Object.keys(NOMBRES).every(m => estado.completados[`${d}_${m}`]);
      if (todasCompletas && estado.diaActual <= d) {
        estado.diaActual = d + 1;
      }
    }
    guardarEstadoLocal();
  } catch(e) { console.warn('No se pudo sincronizar completados', e); }
}

function cambiarNombre() {
  const nuevo = prompt('¿Cuál es tu nuevo nombre?', estado.nombre);
  if (!nuevo || nuevo.trim() === estado.nombre) return;
  fetch('/api/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ codigo: estado.codigo, nuevoNombre: nuevo.trim() })
  }).catch(()=>{});
  estado.nombre = nuevo.trim();
  guardarEstadoLocal();
  document.getElementById('header-nombre-text').textContent = estado.nombre;
}

async function renderInicio() {
  intentarDesbloquearSiguienteDia();
  const cont = document.getElementById('dias-container');
  cont.innerHTML = '';
  if (estado.codigo) {
    try {
      const rp = await fetch('/api/progreso?codigo='+encodeURIComponent(estado.codigo));
      const dp = await rp.json();
      if (dp.ok && dp.progreso) {
        const p = dp.progreso;
        const mat = MATERIAS[p.materia];
        const pct = Math.round((p.puntaje / p.total) * 100);
        const banner = document.createElement('div');
        banner.style.cssText = 'background:white;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,0.1);border:3px solid #51CF66;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap';
        banner.innerHTML = `<div><p style="font-weight:800;font-size:1rem">⏸️ Examen en progreso</p><p style="color:#888;font-size:0.85rem">${mat.emoji} ${mat.nombre} · Día ${p.dia} · Pregunta ${p.idx+2} de ${p.total} · ${pct}% completado</p></div><div style="display:flex;gap:8px"><button onclick="continuarExamen(${JSON.stringify(p).replace(/"/g,'&quot;')})" style="background:linear-gradient(135deg,#51CF66,#37B24D);color:white;border:none;border-radius:12px;padding:10px 20px;font-family:Nunito,sans-serif;font-weight:800;cursor:pointer">▶️ Continuar</button><button onclick="this.closest('div').parentElement.remove()" style="background:#F0F0F0;border:none;border-radius:12px;padding:10px 16px;font-family:Nunito,sans-serif;font-weight:700;cursor:pointer">✕</button></div>`;
        cont.appendChild(banner);
      }
    } catch(e) {}
  }
  for (let dia = 1; dia <= TOTAL_DIAS; dia++) {
    const disponible = diaDisponible(dia);
    const completo = diaCompleto(dia);
    const esActivo = dia === estado.diaActual && disponible && !completo;
    const card = document.createElement('div');
    card.className = `dia-card fade-in ${disponible ? (esActivo ? 'activo' : 'desbloqueado') : 'bloqueado'}`;
    card.style.animationDelay = `${(dia-1)*0.06}s`;
    let materiasHtml = '';
    for (const [key, mat] of Object.entries(MATERIAS)) {
      const done = materiaCompletada(dia, key);
      materiasHtml += `
        <button class="materia-btn ${mat.clase} ${done ? 'completado' : ''}"
                onclick="iniciarExamen(${dia},'${key}')"
                ${!disponible ? 'disabled' : ''}>
          <span class="mat-icon">${mat.emoji}</span>
          ${mat.nombre.split(' ')[0]}
        </button>`;
    }
    const lockIcon = !disponible ? '🔒 ' : (completo ? '✅ ' : '');
    card.innerHTML = `
      <div class="dia-header">
        <div class="dia-num">${dia}</div>
        <div class="dia-info">
          <h3>${lockIcon}Día ${dia}</h3>
          <p>${disponible ? (completo ? '¡Completado!' : 'En progreso...') : 'Completa el día anterior primero'}</p>
        </div>
      </div>
      <div class="materias-grid">${materiasHtml}</div>
    `;
    cont.appendChild(card);
  }
}

async function iniciarExamen(dia, materia) {
  examenActual = { dia, materia, preguntas: [], idx: 0, respuestas: [], puntaje: 0, intentos: 0 };
  const mat = MATERIAS[materia];
  document.getElementById('examen-badge').textContent = `${mat.emoji} ${mat.nombre}`;
  document.getElementById('examen-badge').style.background = mat.gradiente;
  document.getElementById('examen-badge').style.color = 'white';
  document.getElementById('examen-badge').style.borderRadius = '50px';
  document.getElementById('examen-badge').style.padding = '6px 16px';
  document.getElementById('examen-dia-label').textContent = `📅 Día ${dia}`;
  document.getElementById('progress-fill').style.background = mat.gradiente;
  mostrar('screen-examen');
  document.getElementById('pregunta-container').innerHTML =
    '<div class="loading"><div class="spinner"></div><span>Cargando preguntas...</span></div>';
  try {
    const res = await fetch(`/api/preguntas?dia=${dia}&materia=${materia}`);
    const data = await res.json();
    if (!data.ok || !data.preguntas.length) {
      document.getElementById('pregunta-container').innerHTML =
        `<div class="error-msg">⚠️ No hay preguntas cargadas para este examen.<br><small>Pídele al profe que las agregue en el Google Sheet.</small></div>`;
      return;
    }
    examenActual.preguntas = data.preguntas;
    renderPregunta();
  } catch(e) {
    document.getElementById('pregunta-container').innerHTML =
      `<div class="error-msg">⚠️ Error de conexión. Revisa el internet e intenta de nuevo.</div>`;
  }
}

function renderPregunta() {
  const { preguntas, idx } = examenActual;
  const q = preguntas[idx];
  const total = preguntas.length;
  const pct = Math.round((idx / total) * 100);
  examenActual.intentos = 0;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `Pregunta ${idx+1} de ${total}`;
  document.getElementById('progress-pct').textContent = pct + '%';

  const letras = ['A','B','C','D'];
  let opcionesHtml = letras.map(l => `
    <button class="opcion-btn" onclick="responder('${l}')" id="op-${l}">
      <span class="opcion-letra">${l}</span>
      <span>${q.opciones[l]}</span>
    </button>
  `).join('');

  document.getElementById('pregunta-container').innerHTML = `
    <div class="fade-in">
      <p class="pregunta-num">📝 Pregunta ${idx+1} de ${total}</p>
      ${q.imagen ? `<img src="${q.imagen}" style="width:100%;max-width:480px;border-radius:14px;margin-bottom:16px;display:block;border:3px solid #E8E8E8;" onerror="this.style.display='none'"/>` : ''}
      ${q.video ? `<a href="${q.video}" target="_blank" style="display:inline-block;margin-bottom:16px;padding:10px 20px;background:#FF0000;color:white;border-radius:12px;text-decoration:none;font-weight:800;font-size:0.95rem;">📺 Ver video explicativo antes de responder</a>` : ''}
      <p class="pregunta-text">${q.pregunta}</p>
      <div class="opciones-list">${opcionesHtml}</div>
      <div class="feedback-msg" id="feedback-msg"></div>
    </div>
  `;
}

function responder(letra) {
  const q = examenActual.preguntas[examenActual.idx];
  const correcta = q.respuesta.toUpperCase();
  const elegida = letra.toUpperCase();
  const feedback = document.getElementById('feedback-msg');
  const btnEl = document.getElementById(`op-${elegida}`);

  // Deshabilitar todos los botones
  ['A','B','C','D'].forEach(l => {
    const b = document.getElementById(`op-${l}`);
    if (b) b.disabled = true;
  });

  if (elegida === correcta) {
    btnEl.classList.add('correcta');
    feedback.textContent = '🎉 ¡Correcto! ¡Muy bien!';
    feedback.className = 'feedback-msg show ok';
    examenActual.puntaje++;
    examenActual.respuestas.push({ pregunta: q.pregunta, elegida, correcta, ok: true });
    setTimeout(() => siguiente(), 1500);
  } else {
    btnEl.classList.add('incorrecta');
    const btnCorrecta = document.getElementById(`op-${correcta}`);
    if (btnCorrecta) btnCorrecta.classList.add('correcta-revelar');
    feedback.textContent = `❌ Era la opción ${correcta}. ¡Sigue adelante!`;
    feedback.className = 'feedback-msg show fail';
    examenActual.respuestas.push({ pregunta: q.pregunta, elegida, correcta, ok: false });
    setTimeout(() => siguiente(), 2500);
  }

  fetch('/api/progreso',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({codigo:estado.codigo,dia:examenActual.dia,materia:examenActual.materia,idx:examenActual.idx,puntaje:examenActual.puntaje,total:examenActual.preguntas.length,respuestas:examenActual.respuestas})}).catch(()=>{});
}

function siguiente() {
  examenActual.idx++;
  if (examenActual.idx < examenActual.preguntas.length) {
    renderPregunta();
  } else {
    terminarExamen();
  }
}

async function terminarExamen() {
  const { dia, materia, puntaje, preguntas, respuestas } = examenActual;
  const total = preguntas.length;
  const pct = Math.round((puntaje / total) * 100);
  const mat = MATERIAS[materia];

  fetch('/api/progreso?codigo='+encodeURIComponent(estado.codigo),{method:'DELETE'}).catch(()=>{});
  estado.completados[`${dia}_${materia}`] = true;
  intentarDesbloquearSiguienteDia();
  guardarEstadoLocal();

  try {
    await fetch('/api/guardar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nombre: estado.nombre, dia, materia: mat.nombre,
        puntaje, total, respuestas, fecha: new Date().toLocaleString('es-CO')
      })
    });
  } catch(e) { console.warn('No se pudo guardar en Sheets', e); }

  let emoji, titulo, sub;
  if (pct === 100)    { emoji = '🏆'; titulo = '¡PERFECTO!';       sub = '¡Sacaste 100%! ¡Eres increíble!'; }
  else if (pct >= 80) { emoji = '🌟'; titulo = '¡Excelente!';      sub = `¡${pct}%! ¡Muy buen trabajo!`; }
  else if (pct >= 60) { emoji = '👍'; titulo = '¡Buen trabajo!';   sub = `¡${pct}%! Sigue practicando.`; }
  else                { emoji = '💪'; titulo = '¡Sigue adelante!'; sub = `${pct}%. ¡Tú puedes mejorar!`; }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-titulo').textContent = `${titulo} ${estado.nombre}`;
  document.getElementById('res-sub').textContent = sub;
  document.getElementById('res-num').textContent = puntaje;
  document.getElementById('res-de').textContent = `de ${total}`;
  document.getElementById('res-circle').style.background = mat.gradiente;
  document.getElementById('res-circle').style.boxShadow = `0 8px 32px ${mat.color}55`;

  const detalle = document.getElementById('res-detalle');
  detalle.innerHTML = respuestas.map((r, i) => `
    <div class="respuesta-item">
      <span class="respuesta-icon">${r.ok ? '✅' : '❌'}</span>
      <span><strong>${i+1}.</strong> ${r.pregunta.substring(0,60)}${r.pregunta.length>60?'...':''}
        ${!r.ok ? `<br><small style="color:#C92A2A">Tu resp: ${r.elegida} · Correcta: ${r.correcta}</small>` : ''}
      </span>
    </div>
  `).join('');

  mostrar('screen-resultado');
  window.scrollTo(0,0);
  lanzarConfetti(pct);
}

function lanzarConfetti(pct) {
  if (pct < 60) return;
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = Array.from({length: pct >= 80 ? 150 : 80}, () => ({
    x: Math.random() * canvas.width, y: -20,
    r: Math.random() * 8 + 4,
    color: ['#FF6B6B','#51CF66','#339AF0','#FF922B','#845EF7','#FFD700'][Math.floor(Math.random()*6)],
    vx: (Math.random()-0.5)*4, vy: Math.random()*3+2,
    angle: Math.random()*360, va: (Math.random()-0.5)*5
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle = p.color; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.angle += p.va; p.vy += 0.05;
    });
    frame++;
    if (frame < 180) requestAnimationFrame(draw);
    else canvas.remove();
  }
  draw();
}

async function continuarExamen(p) {
  const mat = MATERIAS[p.materia];
  const res = await fetch(`/api/preguntas?dia=${p.dia}&materia=${p.materia}`);
  const data = await res.json();
  examenActual = { dia: p.dia, materia: p.materia, preguntas: data.preguntas, idx: p.idx+1, puntaje: p.puntaje, respuestas: p.respuestas, intentos: 0 };
  document.getElementById('examen-badge').textContent = `${mat.emoji} ${mat.nombre}`;
  document.getElementById('examen-badge').style.background = mat.gradiente;
  document.getElementById('examen-badge').style.color = 'white';
  document.getElementById('examen-badge').style.borderRadius = '50px';
  document.getElementById('examen-badge').style.padding = '6px 16px';
  document.getElementById('examen-dia-label').textContent = `📅 Día ${p.dia}`;
  document.getElementById('progress-fill').style.background = mat.gradiente;
  mostrar('screen-examen');
  renderPregunta();
}

// ── MIS RESULTADOS ───────────────────────────────────────────────────
async function verMisResultados() {
  mostrar('screen-misresultados');
  window.scrollTo(0,0);
  const cont = document.getElementById('resultados-container');
  cont.innerHTML = '<div class="loading"><div class="spinner"></div><span>Cargando...</span></div>';

  try {
    const res = await fetch('/api/resultados?nombre=' + encodeURIComponent(estado.nombre));
    const data = await res.json();

    if (!data.ok || !data.resultados.length) {
      cont.innerHTML = `<div style="text-align:center;padding:40px;color:#888">
        <div style="font-size:3rem">📭</div>
        <p style="margin-top:12px;font-weight:700;font-size:1.1rem">Aún no tienes resultados.<br>¡Completa tu primer examen!</p>
      </div>`;
      return;
    }

    const COLORES = { MAT:'#FF6B6B', BIO:'#51CF66', QUI:'#845EF7', SOC:'#FF922B', LEN:'#339AF0' };
    const NOMBRES = { MAT:'Matemáticas', BIO:'Biología', QUI:'Química', SOC:'Cs. Sociales', LEN:'Lenguaje' };
    const EMOJIS  = { MAT:'🔢', BIO:'🌿', QUI:'⚗️', SOC:'🌍', LEN:'📖' };

    // Agrupar por materia
    const porMateria = {};
    data.resultados.forEach(r => {
      const matKey = Object.keys(NOMBRES).find(k => NOMBRES[k] === r.materia) || r.materia;
      if (!porMateria[matKey]) porMateria[matKey] = [];
      porMateria[matKey].push(r);
    });

    let html = '';
    for (const [mat, resultados] of Object.entries(porMateria)) {
      const color   = COLORES[mat] || '#888';
      const nombre  = NOMBRES[mat] || mat;
      const emoji   = EMOJIS[mat]  || '📚';
      const totalPct = resultados.reduce((a, r) => a + parseInt(r.porcentaje), 0);
      const promedio = Math.round(totalPct / resultados.length);
      const promColor = promedio >= 80 ? '#51CF66' : promedio >= 60 ? '#FF922B' : '#FF6B6B';

      html += `<div class="res-card fade-in" style="border-left:6px solid ${color}">
        <div class="res-card-header">
          <h3 class="res-card-titulo">${emoji} ${nombre}</h3>
          <span class="res-promedio" style="background:${color}22;color:${color}">Promedio: ${promedio}%</span>
        </div>
        <div class="res-barras">`;

      resultados.forEach(r => {
        const pct = parseInt(r.porcentaje);
        const h = Math.max(4, Math.round((pct / 100) * 80));
        const bg = pct >= 80 ? '#51CF66' : pct >= 60 ? '#FF922B' : '#FF6B6B';
        html += `<div class="res-barra-wrap">
          <span class="res-barra-pct" style="color:${bg}">${pct}%</span>
          <div class="res-barra" style="height:${h}px;background:${bg}"></div>
          <span class="res-barra-dia">${r.dia}</span>
        </div>`;
      });

      html += `</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <span style="font-size:0.8rem;color:#888">${resultados.length} examen${resultados.length>1?'es':''} completado${resultados.length>1?'s':''}</span>
          <span style="font-weight:800;color:${promColor};font-size:0.95rem">${promedio>=80?'💪 ¡Fuerte!':promedio>=60?'👍 Bien':'⚠️ Necesita práctica'}</span>
        </div>
      </div>`;
    }

    cont.innerHTML = html;
  } catch(e) {
    cont.innerHTML = '<div class="error-msg">⚠️ Error cargando resultados. Revisa la conexión.</div>';
  }
}

// ── VOLVER ───────────────────────────────────────────────────────────
function volverInicio() {
  mostrar('screen-inicio');
  renderInicio();
  window.scrollTo(0,0);
}

// ── INIT ─────────────────────────────────────────────────────────────
cargarEstado();
if (estado.nombre) {
  mostrarHeaderNombre();
  mostrar('screen-inicio');
  sincronizarCompletadosDesdeSheets().then(() => renderInicio());
} else {
  mostrar('screen-login');
}
</script>
